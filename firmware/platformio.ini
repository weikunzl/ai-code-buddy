; Shared configuration — src/ is board-agnostic apart from a couple of
; board-specific branches guarded by BUDDY_BOARD_S3.
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_src_filter = +<*> +<buddies/> -<diagnostics/>
lib_deps =
    m5stack/M5Unified @ ^0.2.0
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

; Original M5StickC Plus — ESP32-PICO-D4, AXP192 PMIC, 4MB flash,
; USB-TTL via AXP192 (auto-reset into bootloader works).
[env:m5stickc-plus]
board = m5stick-c
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0

; M5 StickS3 — ESP32-S3-PICO-1-N8R8 (8MB flash + 8MB PSRAM),
; PY32 PMIC, BMI270 IMU, ES8311 audio codec, native USB-OTG
; (no RTS/DTR, so esptool can't pulse into bootloader; manual download
; mode required: hold B + short-press power).
[env:m5sticks3]
board = m5stack-stamps3
board_build.partitions = partitions_8mb.csv
board_upload.flash_size = 8MB
upload_flags =
    --before=no_reset
    --after=hard_reset
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBUDDY_BOARD_S3

[env:m5sticks3-speakerdiag]
board = m5stack-stamps3
board_build.partitions = partitions_8mb.csv
board_upload.flash_size = 8MB
upload_flags =
    --before=no_reset
    --after=hard_reset
build_src_filter = -<*> -<buddies/> +<diagnostics/speaker_diag.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBUDDY_BOARD_S3
